[build]
  command = "npm run build"
  publish = "dist"
  # Netlify deploys from this branch (set in Netlify dashboard)
  # Production branch: production
  # master pushes will NOT trigger a deploy — only production does

[build.environment]
  NODE_VERSION = "22"
  # NODE_ENV intentionally NOT set to "production" here —
  # setting it causes npm ci to skip devDependencies (typescript, vite, etc.)
  # Vite already builds in production mode by default

# Deploy context overrides
[context.production]
  command = "npm run build"

[context.deploy-preview]
  command = "npm run build"

[context.branch-deploy]
  command = "npm run build"
