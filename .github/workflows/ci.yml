name: CI

on:
  push:
    branches: [master, production]
  pull_request:
    branches: [master, production]

permissions:
  contents: read

jobs:
  quality:
    name: Lint, Type-check & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (includes tsc type-check)
        run: npm run build
